project:
  type: book
  output-dir: docs

book:
  title: "PTED Semeser Project"
  subtitle: "something with gps data"
  author:
    - Amelia
    - Christopher
  date: "2026-06-07"
  downloads: pdf           # adds a PDF download button to the HTML navbar

  chapters:
    - file: index.qmd
      text: "Titelseite"   # sidebar label for the title page
    - chapters/abstract.qmd
    - chapters/introduction.qmd
    - chapters/methods.qmd
    - chapters/results.qmd
    - chapters/discussion.qmd
    - chapters/appendix.qmd
    - chapters/references.qmd
    
  appendices:
      - chapters/proposal2.qmd
    # - 7-anhang-rohdaten.qmd
    # - 8-anhang-statistik.qmd

bibliography: references.bib
lang: en                   # controls automatic text (e.g. "Abgabedatum" vs "Submission date")

institut: "Institut für Umwelt und Natürliche Ressourcen"
keywords: "Robuste Regression, Ausreisser, Allometrie, Säugetiere, Gehirngrösse, Statistik"
confidential: false         # adds a "Vertraulich" notice on the title page
zhaw-cover-image:
  src: cover.png
  max-width: 100%          # optional, constrains the image on the title page
  max-height: 5cm
thesis-type: "Projektarbeit 2"
degree-type: "Bachelorstudiengang"
study-year: "2009"
submission-date: "2024-12-15"
study-direction: "Umweltingenieurwesen"
supervisors:
  - title: "Prof. Dr."
    name: "Max Mustermann"
    affiliation: "ZHAW Life Sciences und Facility Management, Wädenswil"
  - title: "Dr."
    name: "Anna Beispiel"
    affiliation: "ETH Zürich, Institut für Umweltingenieurwissenschaften, Zürich"
  - title: "Prof. Dr."
    name: "Susanne Müller"
    affiliation: "Universität Zürich, Institut für Evolutionsbiologie und Umweltwissenschaften, Zürich"

format:
  zhaw-lsfm-typst: default
  html:
    toc: true
    number-sections: true
    css:
      - _extensions/zhaw-lsfm/zhaw-lsfm/zhaw-html.css
    filters:
      - _extensions/zhaw-lsfm/zhaw-lsfm/html-labels.lua
    template-partials:
      - _extensions/zhaw-lsfm/zhaw-lsfm/partials/title-block.html
    shortcodes:
      - _extensions/zhaw-lsfm/zhaw-lsfm/shortcodes.lua
    execute:
      warning: false
      error: true

  # zhaw-lsfm-html: default
